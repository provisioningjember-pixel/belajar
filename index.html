<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Belajar HTML</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 4px solid #007bff;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        .btn-test {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-test:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Halo, Selamat Datang! 👋</h2>
        <p>File <strong>index.html</strong> ini berhasil dibuat langsung di repositori GitHub kamu.</p>
        <hr>
        <p>Silakan klik tombol di bawah untuk menguji interaksinya:</p>
        <button class="btn-test" onclick="alert('Mantap! Coding HTML kamu berjalan lancar!')">Uji Tombol</button>
    </div>

</body>
</html>
